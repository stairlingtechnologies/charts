apiVersion: v1
kind: Service
metadata:
  name: {{ include "chatbot.name" . }}
  labels:
    app: stairling
    component: chatbot
    {{ include "chatbot.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    {{ include "chatbot.selectorLabels" . }}
