apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "assistant.name" .  | default "assistant-consumer" }}
  labels:
    application: stairling
    component: assistant
    {{ include "assistant.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      application: stairling
      component: assistant
      {{ include "assistant.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        application: stairling
        component: assistant
        {{- with .Values.podLabels }}
        {{ toYaml . | nindent 8 }}
        {{- end }}
        {{ include "assistant.selectorLabels" . | nindent 8 }}
      annotations:
        kubectl.kubernetes.io/default-container: assistant
        {{- with .Values.podAnnotations }}
        {{ toYaml . | nindent 8 }}
        {{- end }}
      {{- if .Values.vault.enabled }}
        vault.security.banzaicloud.io/vault-addr: {{ .Values.vault.url | quote }}
        vault.security.banzaicloud.io/vault-role: {{ .Values.vault.role | quote }}
        vault.security.banzaicloud.io/vault-skip-verify: {{ .Values.vault.skipVerify | quote }}
      {{- if and .Values.vault.envFrom.enabled .Values.vault.envFrom.path }}
        vault.security.banzaicloud.io/vault-env-from-path: {{ .Values.vault.envFrom.path }}
      {{- end }}
      {{- end }}
    spec:
      {{- if .Values.serviceAccount.create }}
      serviceAccountName: {{ (include "assistant.serviceAccountName" .) | lower }}
      {{- end }}
      containers:
        - name: assistant
          image: {{ include "assistant.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext}}
          securityContext:
            {{ toYaml . | nindent 12 }}
          {{ end }}
          {{- with .Values.env }}
          env:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe }}
          livenessProbe:
            {{ toYaml .Values.livenessProbe | nindent 12 }}
          {{- end }}
          ports:
          - name: http
            containerPort: 8080
            protocol: TCP
          {{- if .Values.readinessProbe }}
          readinessProbe:
            {{ toYaml .Values.readinessProbe | nindent 12 }}
           {{- end }}
          {{- with .Values.resources }}
          resources:
            {{ toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: rules-config
              mountPath: /app/config
              readOnly: true
      automountServiceAccountToken: {{ coalesce .Values.vault.enabled .Values.serviceAccount.token }}
      terminationGracePeriodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{ toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: rules-config
          configMap:
            name: {{ include "assistant.name" .  | default "assistant" }}-rules