replicaCount: 1

name: &name assistant

strategy: {}
#  type: Recreate
# Rollout sample
# canary:
#   maxSurge: 3
#   maxUnavailable: 0
#   canaryService: app-canary
#   stableService: app
#   steps:
#     - setWeight: 50
#     - pause: {}

image:
  repository: ghcr.io/stairlingtechnologies/stairling-assistant
  tag: ''
  pullSecrets: []
  pullPolicy: Always
  #  - name: secret


serviceAccount:
  create: true
  token: true
  name: *name
  annotations: {}

env: []

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 60
  timeoutSeconds: 30
  failureThreshold: 3
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
podAnnotations: {}
podLabels: {}
resources: {}
nodeSelector: {}
affinity: {}
tolerations: []

vault:
  enabled: true
  role: ''
  skipVerify: "true"
  url: ''
  envFrom:
    enabled: false
    path: ''

initContainers: []

extraVolumes: []
extraVolumeMounts: []
extraContainers: []
preInitContainers: []
extraResources: ""
